name: Charlotte Bridge

on:
  workflow_dispatch:
    inputs:
      command:
        description: "Charlotte command to run"
        required: false
        default: "mlb_sim"
        type: choice
        options:
          - mlb_sim
          - nba_sim
          - status
          - list
          - help
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: charlotte-bridge
  cancel-in-progress: false

jobs:
  run:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/charlotte'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps if present
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found; continuing with standard library runtime."
          fi

      - name: Prepare output folders
        run: |
          mkdir -p output outputs logs

      - name: Resolve Charlotte command
        id: resolve
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_COMMAND="${{ inputs.command }}"
          else
            RAW_COMMAND='${{ github.event.comment.body }}'
          fi

          echo "raw_command=${RAW_COMMAND}" | tee -a logs/charlotte_command.log

          case "$RAW_COMMAND" in
            *"/charlotte nba sim pregame"*|*"/charlotte nba liveflow"*|*"/charlotte nba validate b003"*|"nba_sim")
              echo "mode=nba_sim" >> "$GITHUB_OUTPUT"
              ;;
            *"/charlotte mlb sim pregame"*|"mlb_sim")
              echo "mode=mlb_sim" >> "$GITHUB_OUTPUT"
              ;;
            *"/charlotte help"*|"help"|"list")
              echo "mode=list" >> "$GITHUB_OUTPUT"
              ;;
            *"/charlotte status"*|"status")
              echo "mode=status" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "mode=mlb_sim" >> "$GITHUB_OUTPUT"
              echo "Unrecognized command; defaulting to mlb_sim." | tee -a logs/charlotte_command.log
              ;;
          esac

      - name: Run Charlotte status
        if: steps.resolve.outputs.mode == 'status'
        run: |
          python charlotte_console.py status 2>&1 | tee logs/charlotte_status.log

      - name: List Charlotte commands
        if: steps.resolve.outputs.mode == 'list'
        run: |
          python charlotte_console.py list 2>&1 | tee logs/charlotte_commands.log

      - name: Run SharpEdge MLB simulation
        if: steps.resolve.outputs.mode == 'mlb_sim'
        run: |
          echo "Starting SharpEdge MLB simulation via sim/sim/runner.py" | tee logs/sharpedge_run.log
          python sim/sim/runner.py 2>&1 | tee -a logs/sharpedge_run.log

          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          summary = {
              "status": "completed",
              "engine": "SharpEdge",
              "sport": "mlb",
              "runner": "sim/sim/runner.py",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "expected_output": "outputs/_wire_test/full_game_edges.json",
              "artifact_paths": ["outputs/**", "output/**", "logs/**"],
          }

          output_path = Path("outputs/_wire_test/full_game_edges.json")
          if output_path.exists():
              summary["output_found"] = True
              summary["output_preview"] = json.loads(output_path.read_text())
          else:
              summary["output_found"] = False

          Path("logs").mkdir(exist_ok=True)
          Path("logs/sharpedge_run_summary.json").write_text(json.dumps(summary, indent=2))
          PY

      - name: Run SharpEdge NBA simulation
        if: steps.resolve.outputs.mode == 'nba_sim'
        run: |
          echo "Starting SharpEdge NBA simulation via sim/nba_runner.py" | tee logs/sharpedge_nba_run.log
          python sim/nba_runner.py 2>&1 | tee -a logs/sharpedge_nba_run.log

          python - <<'PY'
          import json
          from datetime import datetime, timezone
          from pathlib import Path

          summary = {
              "status": "completed",
              "engine": "SharpEdge",
              "sport": "nba",
              "runner": "sim/nba_runner.py",
              "timestamp_utc": datetime.now(timezone.utc).isoformat(),
              "expected_output": "outputs/nba/_wire_test/nba_full_game_edges.json",
              "artifact_paths": ["outputs/**", "output/**", "logs/**"],
          }

          output_path = Path("outputs/nba/_wire_test/nba_full_game_edges.json")
          if output_path.exists():
              summary["output_found"] = True
              summary["output_preview"] = json.loads(output_path.read_text())
          else:
              summary["output_found"] = False

          Path("logs").mkdir(exist_ok=True)
          Path("logs/sharpedge_nba_run_summary.json").write_text(json.dumps(summary, indent=2))
          PY

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          dmesg | tail -n 200 > logs/dmesg_tail.txt || true
          journalctl -n 200 --no-pager > logs/journal_tail.txt || true
          find . -maxdepth 4 -type f | sort > logs/file_manifest_on_failure.txt || true

      - name: Create artifact placeholders
        if: always()
        run: |
          mkdir -p output outputs logs
          echo "ok" > logs/keep.json
          find outputs output logs -maxdepth 5 -type f | sort > logs/artifact_manifest.txt || true

      - name: Upload sim outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-output-${{ github.run_id }}
          path: |
            outputs/**
            output/**
            logs/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

      - name: Post issue comment with result
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const mode = '${{ steps.resolve.outputs.mode }}';
            const status = '${{ job.status }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Charlotte Bridge finished.\n\nMode: ${mode}\nStatus: ${status}\nRun: ${runUrl}`
            });

      - name: Post to Slack optional
        if: always() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -sS -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"Charlotte Bridge run ${{ github.run_id }} finished with status: ${{ job.status }}\"}" \
            "$SLACK_WEBHOOK_URL" || true
