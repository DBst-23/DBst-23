name: WNBA Lineup Monitor

on:
  workflow_dispatch:
    inputs:
      send_test:
        description: "Send a Pushover test notification"
        required: false
        type: boolean
        default: true
  schedule:
    - cron: "*/5 * * * *"

concurrency:
  group: wnba-lineup-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore lineup-monitor state
        uses: actions/cache/restore@v4
        with:
          path: data/wnba_monitor/state.json
          key: wnba-lineup-state-${{ github.run_id }}
          restore-keys: |
            wnba-lineup-state-

      - name: Send Pushover test notification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test }}
        env:
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_DEVICE: ${{ secrets.PUSHOVER_DEVICE }}
        run: |
          python - <<'PY'
          import json
          import os
          import urllib.parse
          import urllib.request

          token = os.environ.get("PUSHOVER_APP_TOKEN", "").strip()
          user = os.environ.get("PUSHOVER_USER_KEY", "").strip()
          device = os.environ.get("PUSHOVER_DEVICE", "").strip()

          if not token or not user:
              raise SystemExit("Missing PUSHOVER_APP_TOKEN or PUSHOVER_USER_KEY")

          fields = {
              "token": token,
              "user": user,
              "title": "SharpEdge WNBA Alerts",
              "message": "✅ Phone delivery is connected. Future confirmed WNBA lineup changes will be pushed to this device.",
              "priority": "1",
              "sound": "siren",
          }
          if device:
              fields["device"] = device

          request = urllib.request.Request(
              "https://api.pushover.net/1/messages.json",
              data=urllib.parse.urlencode(fields).encode("utf-8"),
              headers={"Content-Type": "application/x-www-form-urlencoded"},
              method="POST",
          )
          with urllib.request.urlopen(request, timeout=30) as response:
              payload = json.loads(response.read().decode("utf-8"))
          if payload.get("status") != 1:
              raise SystemExit(f"Pushover rejected test: {payload}")
          print("Pushover test notification sent successfully.")
          PY

      - name: Run WNBA lineup monitor
        env:
          SPORTRADAR_API_KEY: ${{ secrets.SPORTRADAR_API_KEY }}
          SPORTRADAR_ACCESS_LEVEL: trial
          SPORTRADAR_WNBA_VERSION: v8
          SPORTRADAR_LANGUAGE: en
          WNBA_LOOKAHEAD_HOURS: 24
          WNBA_PRETIP_WINDOW_MINUTES: 90
          WNBA_POSTTIP_GRACE_MINUTES: 15
          WNBA_MAX_SUMMARY_REQUESTS_PER_RUN: 3
          PUSHOVER_APP_TOKEN: ${{ secrets.PUSHOVER_APP_TOKEN }}
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_DEVICE: ${{ secrets.PUSHOVER_DEVICE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python wnba_lineup_monitor.py

      - name: Save lineup-monitor state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/wnba_monitor/state.json
          key: wnba-lineup-state-${{ github.run_id }}

      - name: Upload lineup snapshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wnba-lineup-snapshots-${{ github.run_number }}
          path: data/wnba_monitor/
          if-no-files-found: warn
          retention-days: 7
